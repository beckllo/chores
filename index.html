<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Tracker Dashboard</title>

<style>
:root{
    --green:#2d5a27;
    --lightgreen:#5f8d4e;
    --brown:#7a5c3e;
    --tan:#f2efe6;
    --white:#ffffff;
    --shadow:0 10px 25px rgba(0,0,0,.15);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#f2efe6,#dfe7d7);
    min-height:100vh;
}

header{
    background:linear-gradient(135deg,var(--green),var(--brown));
    color:white;
    padding:25px;
    text-align:center;
    box-shadow:var(--shadow);
}

header h1{
    font-size:2.5rem;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:var(--shadow);
}

.stat-number{
    font-size:2rem;
    font-weight:bold;
    color:var(--green);
}

.controls{
    display:grid;
    grid-template-columns:2fr 1fr 1fr 1fr auto;
    gap:10px;
    margin-bottom:25px;
}

input,select{
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
}

.add-btn{
    background:var(--green);
    color:white;
}

.add-btn:hover{
    transform:translateY(-2px);
}

.progress-container{
    margin-bottom:25px;
}

.progress-bar{
    background:#ddd;
    height:30px;
    border-radius:30px;
    overflow:hidden;
}

.progress{
    height:100%;
    background:linear-gradient(90deg,var(--green),var(--lightgreen));
    width:0%;
    transition:.5s;
}

.task-grid{
    display:grid;
    gap:15px;
}

.task{
    background:white;
    padding:18px;
    border-radius:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:var(--shadow);
}

.task-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.task.completed{
    opacity:.6;
}

.task.completed .title{
    text-decoration:line-through;
}

.priority-high{
    color:red;
    font-weight:bold;
}

.priority-medium{
    color:orange;
    font-weight:bold;
}

.priority-low{
    color:green;
    font-weight:bold;
}

.badge{
    background:var(--lightgreen);
    color:white;
    padding:5px 10px;
    border-radius:20px;
    font-size:.8rem;
}

.delete-btn{
    background:#d9534f;
    color:white;
}

.dark{
    background:#121212;
    color:white;
}

.dark .card,
.dark .task{
    background:#1f1f1f;
    color:white;
}

.toggle-theme{
    margin-top:10px;
    background:white;
    color:black;
}

@media(max-width:900px){
.controls{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<header>
    <h1>🌾 Task & Chore Dashboard</h1>
    <p>Track Projects, Chores & Goals</p>

    <button class="toggle-theme" onclick="toggleTheme()">
        Toggle Dark Mode
    </button>
</header>

<div class="container">

<div class="stats">

<div class="card">
<h3>Total Tasks</h3>
<div class="stat-number" id="totalTasks">0</div>
</div>

<div class="card">
<h3>Completed</h3>
<div class="stat-number" id="completedTasks">0</div>
</div>

<div class="card">
<h3>Remaining</h3>
<div class="stat-number" id="remainingTasks">0</div>
</div>

<div class="card">
<h3>Completion</h3>
<div class="stat-number" id="completionRate">0%</div>
</div>

</div>

<div class="card">

<h2>Add New Task</h2>

<div class="controls">

<input id="taskInput" placeholder="Task name">

<select id="category">
<option>General</option>
<option>House</option>
<option>Work</option>
<option>Farm</option>
<option>Construction</option>
<option>Personal</option>
</select>

<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<input type="date" id="dueDate">

<button class="add-btn" onclick="addTask()">
Add Task
</button>

</div>

</div>

<br>

<div class="card">

<h2>Overall Progress</h2>

<div class="progress-container">
<div class="progress-bar">
<div class="progress" id="progressBar"></div>
</div>
</div>

</div>

<br>

<div class="card">

<h2>Search Tasks</h2>

<input
id="search"
placeholder="Search..."
onkeyup="renderTasks()">

</div>

<br>

<div class="task-grid" id="taskList"></div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function addTask(){

const taskName =
document.getElementById("taskInput").value.trim();

if(!taskName) return;

tasks.push({
id:Date.now(),
name:taskName,
category:document.getElementById("category").value,
priority:document.getElementById("priority").value,
dueDate:document.getElementById("dueDate").value,
completed:false
});

document.getElementById("taskInput").value="";

save();
renderTasks();
}

function toggleTask(id){

tasks=tasks.map(task=>{
if(task.id===id){
task.completed=!task.completed;
}
return task;
});

save();
renderTasks();
}

function deleteTask(id){

tasks=tasks.filter(task=>task.id!==id);

save();
renderTasks();
}

function renderTasks(){

const search =
document.getElementById("search").value.toLowerCase();

const container =
document.getElementById("taskList");

container.innerHTML="";

const filtered =
tasks.filter(task=>
task.name.toLowerCase().includes(search)
);

filtered.forEach(task=>{

const div=document.createElement("div");

div.className=
`task ${task.completed?"completed":""}`;

div.innerHTML=`

<div class="task-left">

<input
type="checkbox"
${task.completed?"checked":""}
onclick="toggleTask(${task.id})">

<div>

<div class="title">
${task.name}
</div>

<small>
📂 ${task.category}
</small>

<br>

<small>
📅 ${task.dueDate || "No Date"}
</small>

<br>

<span class="badge">
${task.priority}
</span>

</div>

</div>

<button
class="delete-btn"
onclick="deleteTask(${task.id})">
Delete
</button>
`;

container.appendChild(div);

});

updateStats();
}

function updateStats(){

const total=tasks.length;

const completed=
tasks.filter(t=>t.completed).length;

const remaining=
total-completed;

const percent=
total===0
?0
:Math.round((completed/total)*100);

document.getElementById("totalTasks").innerText=total;
document.getElementById("completedTasks").innerText=completed;
document.getElementById("remainingTasks").innerText=remaining;
document.getElementById("completionRate").innerText=
percent+"%";

document.getElementById("progressBar").style.width=
percent+"%";
}

function toggleTheme(){

document.body.classList.toggle("dark");

localStorage.setItem(
"theme",
document.body.classList.contains("dark")
?"dark"
:"light"
);
}

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
}

renderTasks();

</script>

</body>
</html>
