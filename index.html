<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxury Appointment Booking</title>
  <!-- Load Supabase CDN Library -->
  <script src="https://jsdelivr.net"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #1a0f0a; /* Deep Dark Brown */
      color: #f5f0eb; /* Soft Beige Text */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-image: linear-gradient(rgba(26, 15, 10, 0.85), rgba(26, 15, 10, 0.85)), url('https://unsplash.com');
      background-size: cover;
      background-position: center;
    }
    .booking-card {
      background-color: #2c1a11; /* Rich Dark Brown Card */
      border: 1px solid #3d2519;
      padding: 40px;
      border-radius: 16px; /* Modern Rounded Corners */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 24px;
      text-align: center;
      margin: 0 0 8px 0;
      color: #e6dfd5; /* Light Beige */
    }
    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #9c8a7f;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: #c4b5a9;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 24px;
      background-color: #120a06; /* Deep Pitch Black-Brown */
      border: 1px solid #4a3326;
      border-radius: 8px;
      color: #f5f0eb;
      font-size: 16px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #c4b5a9;
    }
    button {
      width: 100%;
      padding: 14px;
      background-color: #c4b5a9; /* Warm Beige Button */
      color: #120a06;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: #dcd3cb;
    }
  </style>
</head>
<body>

  <div class="booking-card">
    <h1>Book Appointment</h1>
    <p class="subtitle">Secure your premium time slot below</p>
    
    <form id="bookingForm">
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="John Doe" required>

      <label for="date">Choose Date</label>
      <input type="date" id="date" required>

      <label for="time">Choose Time</label>
      <input type="time" id="time" required>

      <button type="submit">Confirm Booking</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
